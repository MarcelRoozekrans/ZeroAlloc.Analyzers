mode: Mainline
major-version-bump-message: "^(feat|fix|refactor|perf)(\\(.*\\))?!:|BREAKING CHANGE"
minor-version-bump-message: "^feat(\\(.*\\))?:"
patch-version-bump-message: "^fix(\\(.*\\))?:"
next-version: 1.0.0
branches:
  main:
    regex: ^main$
    mode: ContinuousDeployment
    tag: ""
    increment: Patch
    prevent-increment-of-merged-branch-version: false
    track-merge-target: false
  pull-request:
    regex: ^(pull|pull\\-requests|pr)[/-]
    mode: ContinuousDelivery
    tag: pr
    increment: Inherit
  feature:
    regex: ^feat(ure)?[/-]
    mode: ContinuousDelivery
    tag: alpha
    increment: Minor
